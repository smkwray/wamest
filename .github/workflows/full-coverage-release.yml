name: Full Coverage Research Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-coverage-release:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Build full coverage research release
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: make full-coverage-release

      - name: Upload full coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-coverage-release
          path: outputs/full_coverage_release
          if-no-files-found: error
