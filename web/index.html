<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WAMEST — Treasury Sector Maturity Estimation</title>
    <meta name="description" content="Public-data research project estimating maturity-related metrics for marketable U.S. Treasury holdings across holder sectors." />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script>
      // Set data-theme before first paint to prevent flash.
      // Falls back to data-theme="light" on <html> if JS is disabled.
      (function() {
        var t;
        try { t = localStorage.getItem('wamest-theme'); } catch(e) {}
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
